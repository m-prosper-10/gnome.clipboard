[package]
name = "emoji-input-engine"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# PHASE 1: Minimal dependencies for build skeleton
# PHASE 2: Will add IBus bindings (likely via gio/glib FFI)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "emoji_input_engine"
path = "src/engine.rs"

[[bin]]
name = "emoji-input-engine"
path = "src/main.rs"
