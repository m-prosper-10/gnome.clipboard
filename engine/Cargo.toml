[package]
name = "emoji-input-engine"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# PHASE 2: IBus integration via GObject bindings
gio = "0.20"
glib = "0.20"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "emoji_input_engine"
path = "src/engine.rs"

[[bin]]
name = "emoji-input-engine"
path = "src/main.rs"
